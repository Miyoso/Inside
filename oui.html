
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
#app{font-family:'Share Tech Mono',monospace;background:#080806;min-height:500px;padding:24px 20px;position:relative;overflow:hidden;border-radius:8px}
#app::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px);pointer-events:none;z-index:1}
.inner{position:relative;z-index:2;max-width:560px;margin:0 auto}
.hdr{text-align:center;margin-bottom:20px}
.hline{height:1px;background:linear-gradient(90deg,transparent,#c8a84b,transparent);margin:8px 0}
.htitle{font-family:'Bebas Neue',sans-serif;font-size:26px;color:#ffd700;letter-spacing:6px;text-shadow:0 0 16px rgba(255,215,0,0.35)}
.hsub{font-size:9px;color:#4a4020;letter-spacing:4px;margin:4px 0}
.skull{color:#c8a84b;opacity:.6;margin:0 8px}
.boot-log{background:rgba(5,5,2,.9);border:1px solid #1a1a08;padding:10px 14px;border-radius:2px;min-height:70px;margin-bottom:16px}
.boot-line{font-size:10px;color:#4a6a28;line-height:1.9}
.login-box{background:rgba(10,8,2,.95);border:1px solid #2e2510;padding:22px 26px;border-radius:2px}
.box-title{text-align:center;font-size:11px;color:#c8a84b;letter-spacing:3px;margin-bottom:16px}
.field{margin-bottom:14px}
.lbl{font-size:9px;color:#4a4020;letter-spacing:3px;display:block;margin-bottom:5px}
input[type=text],input[type=password]{width:100%;background:rgba(0,0,0,.6);border:1px solid #201808;color:#c8b870;font-family:'Share Tech Mono',monospace;font-size:13px;padding:9px 12px;border-radius:2px;outline:none}
input:focus{border-color:#c8a84b!important;box-shadow:0 0 10px rgba(200,168,75,.2)}
.err-msg{font-size:10px;color:#ff4444;text-align:center;padding:8px;border:1px solid rgba(255,68,68,.25);background:rgba(255,68,68,.05);margin-bottom:12px;border-radius:2px}
.btn-main{width:100%;background:transparent;border:1px solid #c8a84b;color:#ffd700;font-family:'Share Tech Mono',monospace;font-size:12px;letter-spacing:2px;padding:11px;cursor:pointer;border-radius:2px;transition:filter .15s}
.btn-main:hover{filter:brightness(1.25)}
.status-bar{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;background:rgba(8,6,0,.9);border:1px solid #201808;margin-bottom:14px}
.lives-wrap{display:flex;align-items:center;gap:7px;font-size:10px;color:#402010;letter-spacing:2px}
.heart{font-size:18px;color:#ff3030;transition:opacity .3s}
.dots{display:flex;gap:7px}
.dot{width:9px;height:9px;border-radius:50%;transition:all .3s}
.qbox{background:rgba(10,8,0,.95);border:1px solid #2e2510;padding:18px 22px;border-radius:2px;margin-bottom:14px}
.qnum{font-size:9px;color:#4a4020;letter-spacing:4px;margin-bottom:10px}
.qtext{font-size:14px;color:#d4b060;line-height:1.7}
.opts{display:flex;flex-direction:column;gap:8px}
.opt-btn{background:transparent;border:1px solid #2e2510;color:#b8a060;font-family:'Share Tech Mono',monospace;font-size:12px;text-align:left;padding:12px 16px;cursor:pointer;border-radius:2px;transition:all .2s;line-height:1.5}
.opt-btn:hover{border-color:#504020;color:#d4b860}
.opt-letter{color:#c8a84b;margin-right:4px}
.feedback{text-align:center;font-size:11px;letter-spacing:2px;padding:10px;border-radius:2px;margin-top:12px;animation:fadeUp .2s ease}
.success-wrap,.fail-wrap{text-align:center;padding:20px 0}
.big-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:6px;margin-bottom:10px}
.photo-frame{border:1px solid #c8a84b;margin:16px auto;max-width:400px;position:relative;border-radius:2px;overflow:hidden;transition:opacity .8s,transform .8s}
.photo-inner{height:260px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;background:#08060000}
.photo-big-icon{font-size:40px;color:#c8a84b;opacity:.25}
.photo-lbl{font-size:12px;color:#c8a84b;letter-spacing:4px}
.photo-sub{font-size:9px;color:#2e2010;letter-spacing:2px}
.photo-frame img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.corner-tl{position:absolute;top:-1px;left:-1px;width:18px;height:18px;border-top:2px solid #ffd700;border-left:2px solid #ffd700}
.corner-br{position:absolute;bottom:-1px;right:-1px;width:18px;height:18px;border-bottom:2px solid #ffd700;border-right:2px solid #ffd700}
.code-line{font-size:9px;color:#2e2010;letter-spacing:3px;margin:10px 0 16px}
.fail-icon{font-size:52px;color:#ff3030;text-shadow:0 0 20px rgba(255,48,48,.4);margin-bottom:12px}
.fail-sub{font-size:11px;color:#4a1a1a;letter-spacing:1px;line-height:2;margin-bottom:20px}
.footer{text-align:center;font-size:8px;color:#1e1808;letter-spacing:3px;margin-top:24px}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
@keyframes flicker{0%,91%,95%,100%{opacity:1}92%{opacity:.3}96%{opacity:.6}}
.flicker{animation:flicker 3s infinite}
</style>
<div id="app">
<div class="inner">
  <div class="hdr">
    <div class="hline"></div>
    <div style="display:flex;align-items:center;justify-content:center;gap:10px;margin:6px 0">
      <span class="skull">☠</span>
      <span class="htitle">UNDERGROUND ACCESS</span>
      <span class="skull">☠</span>
    </div>
    <div class="hsub">RÉSEAU ILLÉGAL — NIVEAU CRIMINEL</div>
    <div class="hline"></div>
  </div>
  <div id="screen"></div>
  <div class="footer">▪ CONNEXION CHIFFRÉE ▪ ANONYMAT GARANTI ▪ RÉSEAU FANTÔME ▪</div>
</div>
</div>
<script>
const CREDS=[{u:'Admin',p:'Admin'},{u:'Cartel',p:'Shadow'},{u:'Ghost',p:'Reaper'}];
const QS=[
  {q:"Un deal tourne mal. Ton associé est neutralisé. Tu fais quoi ?",opts:["Tu récupères la marchandise et tu disparais","Tu attends les secours sur place","Tu appelles les flics toi-même","Tu abandonnes tout et tu cours"],c:0},
  {q:"Quelle est la règle d'or dans le milieu ?",opts:["Toujours faire confiance à ton équipe","Ne jamais parler aux inconnus","On ne laisse aucune trace, aucun témoin","L'argent avant tout"],c:2},
  {q:"Une livraison est interceptée par une unité rivale. Tu as 3 hommes. Quelle stratégie ?",opts:["Négocier un partage","Contournement par le nord, récupération discrète","Attaque frontale immédiate","Appeler des renforts et attendre"],c:1},
  {q:"Tu trouves une balance dans ton crew. Que fais-tu avant tout ?",opts:["Tu l'écartes discrètement et tu changes tous les protocoles","Tu confrontes immédiatement le suspect","Tu en parles au chef du cartel rival","Tu ignores, c'est peut-être faux"],c:0}
];
let phase='login',curQ=0,lives=3,selected=null;

const screen=document.getElementById('screen');
const LETTERS=['A','B','C','D'];

function bootLines(){
  const lines=["> Initialisation du réseau souterrain...","&gt; Chiffrement AES-256 activé","&gt; Connexion au serveur fantôme... [OK]","&gt; Protocole d'identification requis"];
  const el=document.getElementById('boot-log');if(!el)return;
  let i=0;
  const t=setInterval(()=>{
    if(i<lines.length){el.innerHTML+=`<div class="boot-line">${lines[i]}</div>`;i++;}
    else clearInterval(t);
  },380);
}

function renderLogin(){
  screen.innerHTML=`
  <div id="boot-log" class="boot-log"></div>
  <div id="lbox" class="login-box">
    <div class="box-title">◈ IDENTIFICATION REQUISE ◈</div>
    <div class="field"><label class="lbl">IDENTIFIANT</label><input type="text" id="uid" placeholder="ex: Admin" autocomplete="off" spellcheck="false"/></div>
    <div class="field"><label class="lbl">MOT DE PASSE</label><input type="password" id="pwd" placeholder="••••••••"/></div>
    <div id="lerr"></div>
    <button class="btn-main" onclick="doLogin()">▶ ACCÉDER AU RÉSEAU</button>
  </div>`;
  bootLines();
  document.getElementById('uid').addEventListener('keydown',e=>e.key==='Enter'&&doLogin());
  document.getElementById('pwd').addEventListener('keydown',e=>e.key==='Enter'&&doLogin());
}

function doLogin(){
  const u=document.getElementById('uid').value.trim();
  const p=document.getElementById('pwd').value.trim();
  const ok=CREDS.find(c=>c.u===u&&c.p===p);
  if(ok){phase='quiz';curQ=0;lives=3;renderQuiz();}
  else{
    const lb=document.getElementById('lbox');
    document.getElementById('lerr').innerHTML='<div class="err-msg">ACCÈS REFUSÉ — Identifiants invalides</div>';
    lb.style.animation='shake .5s';
    setTimeout(()=>lb.style.animation='',550);
  }
}

function renderQuiz(){
  const q=QS[curQ];
  const dotsHtml=QS.map((_,i)=>`<div class="dot" style="background:${i<curQ?'#c8a84b':i===curQ?'#ffd700':'#222'};box-shadow:${i===curQ?'0 0 7px #ffd700':'none'}"></div>`).join('');
  const heartsHtml=Array.from({length:3}).map((_,i)=>`<span class="heart" style="opacity:${i<lives?1:.12};filter:${i<lives?'drop-shadow(0 0 5px #ff3030)':'none'}">♦</span>`).join('');
  const optsHtml=q.opts.map((o,i)=>`<button class="opt-btn" id="opt${i}" onclick="pick(${i})"><span class="opt-letter">${LETTERS[i]}.</span> ${o}</button>`).join('');
  screen.innerHTML=`
  <div class="status-bar"><div class="lives-wrap">${heartsHtml}<span>${lives} VIE${lives>1?'S':''}</span></div><div class="dots">${dotsHtml}</div></div>
  <div class="qbox"><div class="qnum">QUESTION ${curQ+1} / ${QS.length}</div><div class="qtext">${q.q}</div></div>
  <div class="opts">${optsHtml}</div>
  <div id="fb"></div>`;
  selected=null;
}

function pick(i){
  if(selected!==null)return;
  selected=i;
  const q=QS[curQ];
  const correct=q.c===i;
  for(let k=0;k<4;k++){
    const b=document.getElementById('opt'+k);if(!b)continue;
    b.style.cursor='default';
    if(k===q.c){b.style.border='1px solid #c8a84b';b.style.color='#ffd700';b.style.background='rgba(200,168,75,.1)';b.style.boxShadow='0 0 12px rgba(200,168,75,.3)';}
    else if(k===i&&!correct){b.style.border='1px solid #ff3a3a';b.style.color='#ff6060';b.style.background='rgba(255,58,58,.08)';}
  }
  const newLives=correct?lives:lives-1;
  const fb=document.getElementById('fb');
  if(fb){
    const txt=correct?'✓ BONNE RÉPONSE — OPÉRATEUR CONFIRMÉ':`✗ ERREUR — ${newLives>0?`${newLives} VIE${newLives>1?'S':''} RESTANTE${newLives>1?'S':''}`:'ÉLIMINATION EN COURS...'}`;
    fb.innerHTML=`<div class="feedback" style="background:${correct?'rgba(200,168,75,.1)':'rgba(255,58,58,.1)'};border:1px solid ${correct?'#c8a84b':'#ff3a3a'};color:${correct?'#ffd700':'#ff6060'}">${txt}</div>`;
  }
  setTimeout(()=>{
    if(correct){
      if(curQ+1>=QS.length){phase='success';renderSuccess();}
      else{curQ++;renderQuiz();}
    } else {
      lives=newLives;
      if(lives<=0){phase='fail';renderFail();}
      else renderQuiz();
    }
  },1300);
}

function renderSuccess(){
  screen.innerHTML=`
  <div class="success-wrap">
    <div class="big-title flicker" style="color:#ffd700;text-shadow:0 0 24px rgba(255,215,0,.45)">◈ ACCÈS ACCORDÉ ◈</div>
    <div style="font-size:11px;color:#6a5820;letter-spacing:2px;margin-bottom:4px">Vous avez prouvé votre allégeance au réseau.</div>
    <div class="photo-frame" id="pframe" style="opacity:0;transform:scale(.92)">
      <div class="photo-inner">
        <div class="photo-big-icon">◉</div>
        <div class="photo-lbl">DOSSIER CLASSIFIÉ</div>
        <div class="photo-sub">Remplacez cette zone par votre image</div>
      </div>
      <div class="corner-tl"></div><div class="corner-br"></div>
    </div>
    <div class="code-line">— PROTOCOLE DELTA-7 DÉVERROUILLÉ —</div>
    <button class="btn-main" style="max-width:220px;margin:0 auto;display:block" onclick="doReset()">↩ DÉCONNEXION</button>
  </div>`;
  setTimeout(()=>{const f=document.getElementById('pframe');if(f){f.style.opacity='1';f.style.transform='scale(1)';}},700);
}

function renderFail(){
  screen.innerHTML=`
  <div class="fail-wrap">
    <div class="fail-icon flicker">✗</div>
    <div class="big-title" style="color:#ff4040;text-shadow:0 0 16px rgba(255,64,64,.35)">ACCÈS REFUSÉ</div>
    <div class="fail-sub">Vous n'avez pas les qualifications requises.<br>Cette tentative a été enregistrée.</div>
    <button class="btn-main" style="max-width:220px;margin:0 auto;display:block;border-color:#ff3a3a;color:#ff6060" onclick="doReset()">↩ RECOMMENCER</button>
  </div>`;
}

function doReset(){phase='login';curQ=0;lives=3;selected=null;renderLogin();}

renderLogin();
</script>
